name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Smoke-test the CLI (offline)
        run: research-radar --offline --memory /tmp/ci_mem.json demo --top 2
      - name: Smoke-test the RL experiment (tiny)
        run: python experiments/run_learning_curve.py --rounds 30 --seeds 2 --out /tmp/ci_curve.png
